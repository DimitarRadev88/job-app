spring:
  application:
    name: review-service

  config:
    import: optional:configserver:http://configserver:8888

  profiles:
    active: default

  datasource:
    url: jdbc:postgresql://localhost:5432/review_service_db
    username: root
    password: peanutbutter
  jpa:
    database: POSTGRESQL
    generate-ddl: true
    show-sql: true
    properties.hibernate.format_sql: true
    hibernate.ddl-auto: create-drop

#ACTUATOR
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true

  info:
    - env.enabled: true

  ##ZIPKIN
  tracing:
    - sampling.probability: 1

info:
  app:
    name: ReviewService
    description: service for job-app

eureka:
  client:
    serviceUrl.defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true


server:
  port: 8084
